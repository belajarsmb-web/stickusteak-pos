<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #16213e, #1a1a2e);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #e94560;
        }

        .header h5 {
            font-size: 16px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 4px;
        }

        .header small {
            font-size: 12px;
            color: #888;
        }

        /* Category Nav - Fixed overlapping */
        .category-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 12px 15px;
            background: #16213e;
            position: sticky;
            top: 60px;
            z-index: 999;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .category-nav::-webkit-scrollbar {
            display: none;
        }

        .category-nav button {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #e94560;
            background: transparent;
            color: #fff;
            font-size: 13px;
            white-space: nowrap;
        }

        .category-nav button.active {
            background: #e94560;
            color: #fff;
        }

        /* Menu Grid - No overlapping */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 15px;
        }

        @media (min-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .menu-card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e9456033;
        }

        .menu-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #222;
        }

        .menu-card-body {
            padding: 12px;
        }

        .menu-card h6 {
            font-size: 14px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 6px;
        }

        .menu-card p {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .menu-card .price {
            font-size: 16px;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 10px;
        }

        .btn-add {
            width: 100%;
            padding: 10px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-add:active {
            opacity: 0.8;
        }

        /* Cart Bar */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #16213e;
            padding: 15px;
            border-top: 2px solid #e94560;
            display: none;
            z-index: 1000;
        }

        .cart-bar.show {
            display: block;
        }

        .cart-bar .btn-view {
            width: 100%;
            padding: 12px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        /* Modal */
        .modal-content {
            background: #1a1a2e;
            color: #fff;
            border: 2px solid #e94560;
        }

        .modal-header {
            border-bottom: 1px solid #e9456033;
        }

        .modal-title {
            color: #e94560;
            font-size: 16px;
        }

        .btn-close {
            filter: invert(1);
        }

        .form-control {
            background: #16213e;
            border: 1px solid #e9456033;
            color: #fff;
        }

        .cart-item {
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #e94560;
            background: transparent;
            color: #e94560;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Content will be rendered by PHP -->
</body>
</html>
